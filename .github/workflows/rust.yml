name: Test Suite

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test-suite:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: test-suite

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --all-features
